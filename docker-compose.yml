services:
  cuidar:
    image: ${CUIDAR_IMAGE:-ghcr.io/tiagojct/cuidar:latest}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - cuidar-data:/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/cuidar.db
      - PORT=3000
      # Required — generate with: openssl rand -hex 32
      - SESSION_SECRET=${SESSION_SECRET}
      # Admin account — created on first run if not present
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_NAME=${ADMIN_NAME:-Administrador}
      # Optional SMTP for email alerts
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-CUIDAR <noreply@cuidar.local>}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  cuidar-data:
    driver: local
